<template>
    <lightning-card title="Hello LWC" icon-name="custom:custom14">
        <div class="slds-var-m-around_medium">
            <!-- Input box that triggers JavaScript on every keystroke -->
            <lightning-input 
                label="Enter your name:" 
                value={greeting} 
                onchange={handleInputChange}>
            </lightning-input>

            <!-- Dynamically displays the updated greeting -->
            <p class="slds-var-m-top_medium slds-text-heading_medium">
                Hello, <b>{greeting}</b>!
            </p>
        </div>
    </lightning-card>
</template>
